services:

  # ── Banco de dados principal ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    # WiredTiger cache mínimo permitido pelo MongoDB 7 (256MB)
    command: mongod --wiredTigerCacheSizeGB 0.5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640M
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Fila de tarefas e cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # maxmemory deve ser menor que o limite do container para evitar OOM kill
    command: redis-server --appendonly yes --maxmemory 112mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 144M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  # ── API principal (FastAPI) ───────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/bugbounty?authSource=admin
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./tools:/app/tools
      - ./backend/app:/app/app            # hot-reload: só o código Python
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nuclei_templates:/root/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"   # acesso ao Ollama no host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-delay 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Worker de background ──────────────────────────────────────────────────
  worker:
    build: ./backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/bugbounty?authSource=admin
      REDIS_URL: ${REDIS_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./tools:/app/tools
      - ./backend/app:/app/app
      - nuclei_templates:/root/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"   # acesso ao Ollama no host
    command: arq app.workers.settings.WorkerSettings
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Interface web (Next.js) ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── UI para o MongoDB (iniciar manualmente quando precisar) ───────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 96M

volumes:
  mongo_data:
  redis_data:
  nuclei_templates:
