services:

  # ── Banco de dados principal ─────────────────────────────────────────────
  # OrbStack M4 24GB 90%: sem VM overhead — MongoDB usa 2 cores + 4GB cache
  # WiredTiger cache = 60% do limite de memória alocado
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    command: >
      mongod
        --wiredTigerCacheSizeGB 1
        --setParameter wiredTigerConcurrentReadTransactions=128
        --setParameter wiredTigerConcurrentWriteTransactions=64
        --setParameter diagnosticDataCollectionEnabled=false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Fila de tarefas e cache ───────────────────────────────────────────────
  # OrbStack M4: 6 io-threads (usa 4 efficiency + 2 performance cores do M4)
  # maxmemory 2GB — pub/sub SSE + fila ARQ com 125+ jobs simultâneos
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 512
        --hz 10
        --dynamic-hz yes
        --lazyfree-lazy-eviction yes
        --lazyfree-lazy-expire yes
        --save ""
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.05"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API principal (FastAPI) ───────────────────────────────────────────────
  # OrbStack M4 90%: 6 uvicorn workers para 3 cores performance
  # OrbStack monta volumes sem VM — reload é quase instantâneo
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/bugbounty?authSource=admin
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HACKERONE_USERNAME: ${HACKERONE_USERNAME:-}
      HACKERONE_API_USERNAME: ${HACKERONE_API_USERNAME:-}
      HACKERONE_API_TOKEN: ${HACKERONE_API_TOKEN:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-xploiter/the-xploiter:latest}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CENSYS_API_ID: ${CENSYS_API_ID:-}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET:-}
      CHAOS_API_KEY: ${CHAOS_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SECURITYTRAILS_TOKEN: ${SECURITYTRAILS_TOKEN:-}
      WEB_CONCURRENCY: 2
    volumes:
      - ./tools:/app/tools
      - ./backend/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nuclei_templates:/root/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-delay 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Workers de background ────────────────────────────────────────────────
  # OrbStack M4 90%: 5 réplicas × 1.5 cores = 7.5 cores para recon
  # MAX_JOBS=25 por worker = 125 jobs simultâneos no total
  # OrbStack: volume mounts nativos — nuclei/ffuf rodam em velocidade nativa
  worker:
    build: ./backend
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/bugbounty?authSource=admin
      REDIS_URL: ${REDIS_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-xploiter/the-xploiter:latest}
      HACKERONE_USERNAME: ${HACKERONE_USERNAME:-}
      HACKERONE_API_USERNAME: ${HACKERONE_API_USERNAME:-}
      HACKERONE_API_TOKEN: ${HACKERONE_API_TOKEN:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CENSYS_API_ID: ${CENSYS_API_ID:-}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET:-}
      CHAOS_API_KEY: ${CHAOS_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SECURITYTRAILS_TOKEN: ${SECURITYTRAILS_TOKEN:-}
      MAX_JOBS: 5
    volumes:
      - ./tools:/app/tools
      - ./backend/app:/app/app
      - nuclei_templates:/root/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq app.workers.settings.WorkerSettings
    restart: on-failure
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    sysctls:
      net.core.somaxconn: 8192
      net.ipv4.tcp_tw_reuse: 1

  # ── Interface web (Next.js) — produção ───────────────────────────────────
  # OrbStack: volume mount nativo = hot reload instantâneo se usar --profile dev
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.05"

  # ── Frontend dev com hot reload (use: docker compose --profile dev up) ───
  frontend-dev:
    image: node:20-alpine
    profiles: [dev]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_TELEMETRY_DISABLED: 1
      WATCHPACK_POLLING: "true"

  # ── UI para o MongoDB (iniciar manualmente quando precisar) ───────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 96M

volumes:
  mongo_data:
  redis_data:
  nuclei_templates:
