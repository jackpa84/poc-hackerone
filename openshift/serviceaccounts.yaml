# ── ServiceAccounts e SCC Bindings ────────────────────────────────────────────
#
# OpenShift usa SecurityContextConstraints (SCC) para controlar permissões.
# Estratégia:
#   mongodb-sa  → anyuid  (MongoDB exige UID 999 para escrever nos volumes)
#   redis-sa    → anyuid  (Redis exige UID 999)
#   backend-sa  → restricted-v2 (sem privilégios especiais)
#   worker-sa   → privileged (precisa de /var/run/docker.sock para scan tools)
#   frontend-sa → restricted-v2
#
# ATENÇÃO: worker-sa com SCC privileged tem acesso total ao nó.
#          Avalie usar Podman socket ou DinD sidecar como alternativa mais segura.

# ── MongoDB SA ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-sa
  namespace: bugbounty
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: mongodb-sa-anyuid
  namespace: bugbounty
subjects:
- kind: ServiceAccount
  name: mongodb-sa
  namespace: bugbounty
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
---
# ── Redis SA ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: bugbounty
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: redis-sa-anyuid
  namespace: bugbounty
subjects:
- kind: ServiceAccount
  name: redis-sa
  namespace: bugbounty
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
---
# ── Backend SA ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: bugbounty
---
# ── Worker SA (privileged para docker socket) ─────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: bugbounty
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: worker-sa-privileged
  namespace: bugbounty
subjects:
- kind: ServiceAccount
  name: worker-sa
  namespace: bugbounty
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:privileged
  apiGroup: rbac.authorization.k8s.io
---
# ── Frontend SA ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: bugbounty
