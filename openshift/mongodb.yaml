# ── MongoDB — StatefulSet com PVC persistente ─────────────────────────────────
#
# Usa StatefulSet (não Deployment) para garantir identidade estável e PVC
# dedicado por réplica. Em OpenShift, mongodb-sa tem SCC anyuid para rodar
# como UID 999 (usuário mongodb da imagem oficial).

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: bugbounty
  labels:
    app: mongodb
    app.kubernetes.io/component: database
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      serviceAccountName: mongodb-sa
      securityContext:
        fsGroup: 999          # garante que o volume pertença ao grupo mongodb
        runAsUser: 999        # UID do usuário mongodb na imagem oficial
        runAsNonRoot: true
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
          name: mongo
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bugbounty-secrets
              key: MONGO_PASSWORD
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          exec:
            command:
            - mongosh
            - "--eval"
            - "db.adminCommand('ping')"
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - mongosh
            - "--eval"
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false   # mongo precisa escrever fora do /data/db
          capabilities:
            drop: ["ALL"]
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
      # storageClassName: "gp3"  # descomente e ajuste para o seu StorageClass
---
# Headless service para o StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: bugbounty
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
    name: mongo
