# ── HTTP: certbot challenge + redirect para HTTPS ───────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tudo mais → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: reverse proxy ─────────────────────────────────────────────────────
# Substitua YOUR_DOMAIN pelo seu domínio real (ex: bugbounty.exemplo.com)
# O bloco SSL só funciona após emitir o certificado com certbot (ver setup-ec2.sh)
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── Certificados (gerados pelo certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── API FastAPI ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── SSE (Server-Sent Events) — sem buffering ──────────────────────────
    location /api/jobs/stream {
        proxy_pass         http://backend/api/jobs/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # SSE exige buffering desligado
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Docs FastAPI (opcional — remova em produção se quiser) ───────────
    location /docs {
        proxy_pass         http://backend/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Frontend Next.js ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js HMR não é necessário em prod, mas não custa)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
